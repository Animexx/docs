name: Test

on:
  push:
    branches:
      - "**"
      - "!main"

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: |
          uv sync --no-dev
          zensical build
